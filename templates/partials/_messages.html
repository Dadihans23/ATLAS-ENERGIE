{% if messages %}
<div id="messages-container" class="px-6 pt-3 space-y-2"
     _="on load wait 4s then add .opacity-0 .translate-y-2 .transition-all .duration-500 then wait 500ms then remove me">
  {% for message in messages %}
  <div class="alert alert-{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %} shadow-sm py-2.5">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
      {% if message.tags == 'success' %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      {% elif message.tags == 'error' %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      {% else %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      {% endif %}
    </svg>
    <span class="text-sm">{{ message }}</span>
  </div>
  {% endfor %}
</div>
{% endif %}
